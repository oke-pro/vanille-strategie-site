services:
  # --- PostgreSQL ---
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vanille_strategie
      POSTGRES_USER: vs
      POSTGRES_PASSWORD: vs_password
    volumes:
      - vs_pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    restart: unless-stopped

  # --- Frontend Next.js ---
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://vanille-strategie-api.oke.pro
    ports:
      - "3200:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  # --- Backend FastAPI ---
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8200:8000"
    env_file:
      - ./backend/.env
    environment:
      - FRONTEND_URL=https://vanille-strategie.oke.pro
      - DATABASE_URL=postgresql+asyncpg://vs:vs_password@db:5432/vanille_strategie
    depends_on:
      - db
    restart: unless-stopped

volumes:
  vs_pgdata:
